# /etc/nginx/sites-available/arena-battle
# Добавляется к существующему nginx, не трогает другие проекты

server {
    listen 80;
    server_name arenabattle.tirskix.space;
    # certbot сам заменит на redirect после получения сертификата
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name arenabattle.tirskix.space;

    ssl_certificate     /etc/letsencrypt/live/arenabattle.tirskix.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arenabattle.tirskix.space/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    # Frontend (Docker nginx на 8080)
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # WebSocket (напрямую к backend на 3001)
    location /ws/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
