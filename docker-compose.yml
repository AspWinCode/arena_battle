services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: robocode
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/robocode
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-jwt}
      COOKIE_SECRET: ${COOKIE_SECRET:-change-me-in-production-cookie}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      PORT: 3001
      NODE_ENV: production
      SANDBOX_PYTHON_IMAGE: robocode/sandbox-python:latest
      SANDBOX_CPP_IMAGE: robocode/sandbox-cpp:latest
      SANDBOX_JAVA_IMAGE: robocode/sandbox-java:latest
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3005:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch(\"http://127.0.0.1:3001/health\").then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  postgres_data:
