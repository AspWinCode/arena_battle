name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: robocode_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npm run db:generate --workspace=apps/backend
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/robocode_test

      - name: Run backend tests
        run: npm run test --workspace=apps/backend
        env:
          DATABASE_URL: postgresql://postgres:test@localhost:5432/robocode_test
          JWT_SECRET: test-secret
          COOKIE_SECRET: test-cookie-secret
          NODE_ENV: test

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Run frontend tests
        run: npm run test --workspace=apps/frontend

      - name: Build frontend
        run: npm run build --workspace=apps/frontend

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build sandbox images
        run: |
          docker build -t robocode/sandbox-python:latest ./docker/sandbox-python
          docker build -t robocode/sandbox-cpp:latest    ./docker/sandbox-cpp
          docker build -t robocode/sandbox-java:latest   ./docker/sandbox-java

      - name: Build app images
        run: docker compose build
